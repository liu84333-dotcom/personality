// ===================== COMPUTE =====================
function computeResult(answers) {
  const s = {E:0,I:0,O:0,A:0,C:0,N:0};
  answers.forEach(a => { if(a) Object.entries(a.traits).forEach(([t,v])=>{ s[t]+=v; }); });
  const isE=s.E>s.I, isO=s.O>2, isA=s.A>s.C, isC=s.C>s.O, isN=s.N>3, isI=s.I>s.E;
  if(isN&&isO) return "敏感艺术家";
  if(isN&&isA) return "焦虑适应者";
  if(isE&&isO) return "外向探索者";
  if(isE&&isA) return "温暖守护者";
  if(isI&&isC) return "深思内省者";
  if(isC&&isI) return "务实执行者";
  const combos=[
    [s.E+s.O,"外向探索者"],[s.A+s.E,"温暖守护者"],
    [s.I+s.C,"深思内省者"],[s.N+s.O,"敏感艺术家"],
    [s.C+s.I,"务实执行者"],[s.N+s.A,"焦虑适应者"],
  ];
  combos.sort((a,b)=>b[0]-a[0]);
  return combos[0][1];
}

        <div class="progress-wrap">
          <div class="progress-labels">
            <span style="font-size:12px;color:#9CA3AF">${groupName}</span>
            <span style="font-size:12px;color:#7C3AED;font-weight:600">${current+1}/${total}</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="step-dots">${dots}</div>
        </div>

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
          <div style="background:${groupColor}20;border:1px solid ${groupColor}40;border-radius:999px;padding:4px 14px;display:inline-flex;align-items:center;gap:6px">
            <span style="font-size:14px">${q.emoji}</span>
            <span style="font-size:11px;color:${groupColor};font-weight:700">${groupLabel}</span>
          </div>
          <span style="font-size:11px;color:#4B5563">第 ${current+1} 题 / 共 ${total} 题</span>
        </div>

        <div style="font-size:18px;font-weight:700;color:#F9FAFB;line-height:1.5;margin-bottom:22px">
          ${q.question}
        </div>

        <div id="options">${opts}</div>

        <button class="btn-primary" id="next-btn" onclick="nextQuestion()" ${btnDisabled}>
          ${btnLabel}
        </button>
      </div>
    `;
  }

  else if(step==="loading") {
    app.innerHTML = `
      <div class="loading-wrap">
        <div class="dna-icon" style="font-size:64px">🧬</div>
        <div style="font-size:18px;font-weight:700;color:#E5E7EB;margin:20px 0 8px">正在分析遗传数据...</div>
        <div style="font-size:13px;color:#6B7280;margin-bottom:32px">结合父母性格 × 家庭环境 × Big Five 模型</div>
        <div class="progress-track" style="margin:0 20px">
          <div class="progress-fill" id="load-bar" style="width:${loadingPct}%"></div>
        </div>
        <div style="margin-top:10px;font-size:12px;color:#7C3AED;font-weight:700">${Math.round(loadingPct)}%</div>
        <div style="margin-top:20px;font-size:12px;color:#4B5563" id="load-label">
          ${loadingPct<30?"🧬 提取遗传特征...":loadingPct<60?"🏠 分析家庭环境影响...":loadingPct<85?"🔬 匹配 Big Five 维度...":"✨ 生成性格报告..."}
        </div>
      </div>
    `;
  }

  else if(step==="result" && resultType) {
    const type = personalityTypes[resultType];
    const totalScore = Object.values(scores).reduce((a,b)=>a+b,0)||1;
    const traits = [
      {label:"外向性 Extraversion", val:Math.min(100,(scores.E/totalScore)*300), color:"#FF6B35"},
      {label:"开放性 Openness",      val:Math.min(100,(scores.O/totalScore)*350), color:"#9B59B6"},
      {label:"宜人性 Agreeableness", val:Math.min(100,(scores.A/totalScore)*350), color:"#1ABC9C"},
      {label:"尽责性 Conscientiousness",val:Math.min(100,(scores.C/totalScore)*350),color:"#4A90E2"},
      {label:"神经质 Neuroticism",   val:Math.min(100,(scores.N/totalScore)*300), color:"#E74C3C"},
    ];
    const traitBars = traits.map(t=>`
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12.5px;color:#D1D5DB">${t.label}</span>
          <span style="font-size:12px;color:${t.color};font-weight:700">${Math.round(t.val)}%</span>
        </div>
        <div class="trait-bar-bg">
          <div class="trait-bar-fill" data-width="${t.val}" style="background:${t.color}"></div>
        </div>
      </div>`).join("");

    const strengths = type.strengths.map(s=>`<span class="chip chip-green">✦ ${s}</span>`).join("");
    const challenges = type.challenges.map(c=>`<span class="chip chip-amber">● ${c}</span>`).join("");

    app.innerHTML = `
      <div class="fade-up">
        <div class="result-header" style="background:linear-gradient(135deg,${type.gradFrom},${type.gradTo})">
          <div class="result-deco"></div>
          <div style="font-size:56px;margin-bottom:8px">${type.emoji}</div>
          <div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.8);margin-bottom:4px">你大概率是</div>
          <div style="font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.2)">${resultType}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.65);margin-top:6px">${type.mbti}</div>
        </div>

        <div class="card" style="margin-bottom:14px">
          <div style="font-size:13px;color:#D1D5DB;line-height:1.8">
            🧬 <strong style="color:${type.color}">遗传 + 环境推断</strong><br>${type.desc}
          </div>
        </div>

        <div class="card" style="margin-bottom:14px">
          <div style="font-size:11px;color:#6B7280;letter-spacing:2px;margin-bottom:16px">BIG FIVE 性格维度推算</div>
          ${traitBars}
          <div style="font-size:11px;color:#4B5563;margin-top:4px">* 基于父母性格遗传率（约40-60%）与家庭环境影响推算，仅供参考</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div class="card" style="margin-bottom:0">
            <div style="font-size:12px;color:#10B981;font-weight:700;margin-bottom:10px">✨ 你的优势</div>
            <div class="chip-grid">${strengths}</div>
          </div>
          <div class="card" style="margin-bottom:0">
            <div style="font-size:12px;color:#F59E0B;font-weight:700;margin-bottom:10px">⚡ 可能挑战</div>
            <div class="chip-grid">${challenges}</div>
          </div>
        </div>

        <div class="card" style="background:linear-gradient(135deg,${type.color}15,${type.color}05);border-color:${type.color}30;margin-bottom:0">
          <div style="font-size:12px;color:${type.color};font-weight:700;margin-bottom:8px">💌 给你的话</div>
          <div style="font-size:13px;color:#D1D5DB;line-height:1.8">${type.advice}</div>
        </div>

        <button class="btn-ghost" onclick="restart()">🔄 重新测试</button>
        <div class="note">
          科学依据：性格遗传率研究来源于双胞胎行为遗传学（Bouchard & McGue, 2003）<br>
          家庭环境影响参考依附理论（Bowlby）与社会学习理论（Bandura）
        </div>
      </div>
    `;

    // Animate bars after render
    setTimeout(()=>{
      document.querySelectorAll(".trait-bar-fill").forEach((el,i)=>{
        const w = el.dataset.width;
        setTimeout(()=>{ el.style.width = w+"%"; }, 200+i*150);
      });
    }, 100);
  }
}

// ===================== DNA SVG =====================
function dnaSVG() {
  let circles = "";
  for(let i=0;i<8;i++){
    const y = 10+i*9;
    const x1 = 15+Math.sin(i*0.8)*14;
    const x2 = 45-Math.sin(i*0.8)*14;
    const delay = i*0.17;
    circles += `
      <circle cx="${x1}" cy="${y}" r="4" fill="#7C3AED"
        style="animation:dna1 1.4s ${delay}s ease-in-out infinite"/>
      <circle cx="${x2}" cy="${y}" r="4" fill="#EC4899"
        style="animation:dna2 1.4s ${delay}s ease-in-out infinite"/>
      <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"
        stroke="#C4B5FD" stroke-width="1.5" opacity="0.45"/>
    `;
  }
  return `<svg width="60" height="80" viewBox="0 0 60 80" style="display:block;margin:0 auto">${circles}</svg>`;
}

// ===================== ACTIONS =====================
function startQuiz() {
  state.step = "quiz";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function selectOpt(i) {
  state.selected = i;
  document.querySelectorAll(".opt-card").forEach((el,idx)=>{
    el.classList.toggle("selected", idx===i);
  });
  const btn = document.getElementById("next-btn");
  if(btn){ btn.disabled = false; }
}

function nextQuestion() {
  if(state.selected===null) return;
  const q = parentQuestions[state.current];
  const ans = q.options[state.selected];
  state.answers.push(ans);
  state.selected = null;

  if(state.current+1 < parentQuestions.length) {
    state.current++;
    render();
    window.scrollTo({top:0,behavior:"smooth"});
  } else {
    // Compute scores
    const sc={E:0,I:0,O:0,A:0,C:0,N:0};
    state.answers.forEach(a=>{ if(a) Object.entries(a.traits).forEach(([t,v])=>{ sc[t]+=v; }); });
    state.scores = sc;
    state.resultType = computeResult(state.answers);
    state.step = "loading";
    state.loadingPct = 0;
    render();
    window.scrollTo({top:0,behavior:"smooth"});

    // Animate loading
    const interval = setInterval(()=>{
      state.loadingPct += Math.random()*8+3;
      if(state.loadingPct >= 100) {
        state.loadingPct = 100;
        clearInterval(interval);
        setTimeout(()=>{ state.step="result"; render(); window.scrollTo({top:0,behavior:"smooth"}); }, 400);
        return;
      }
      const bar = document.getElementById("load-bar");
      if(bar) bar.style.width = state.loadingPct+"%";
      const pctEl = bar && bar.parentElement && bar.parentElement.nextElementSibling;
      const labelEl = document.getElementById("load-label");
      if(pctEl) pctEl.textContent = Math.round(state.loadingPct)+"%";
      if(labelEl) labelEl.textContent =
        state.loadingPct<30?"🧬 提取遗传特征...":
        state.loadingPct<60?"🏠 分析家庭环境影响...":
        state.loadingPct<85?"🔬 匹配 Big Five 维度...":"✨ 生成性格报告...";
    }, 120);
  }
}

function restart() {
  state = {step:"intro",current:0,answers:[],selected:null,resultType:null,scores:{},loadingPct:0};
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ===================== INIT =====================
render();
</script>
